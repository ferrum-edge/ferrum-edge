---
# HTTP/1.1 performance test config
# Gateway listens on HTTP (8000), proxies to HTTP/1.1 backend
proxies:
  - id: "h1-users"
    name: "HTTP/1.1 Users API"
    listen_path: "/api/users"
    backend_protocol: http
    backend_host: "127.0.0.1"
    backend_port: 3001
    strip_listen_path: false
    preserve_host_header: false
    backend_connect_timeout_ms: 5000
    backend_read_timeout_ms: 10000
    backend_write_timeout_ms: 10000
    auth_mode: single
    plugins: []

  - id: "h1-health"
    name: "HTTP/1.1 Health Check"
    listen_path: "/health"
    backend_protocol: http
    backend_host: "127.0.0.1"
    backend_port: 3010
    strip_listen_path: false
    preserve_host_header: false
    backend_connect_timeout_ms: 1000
    backend_read_timeout_ms: 5000
    backend_write_timeout_ms: 5000
    auth_mode: single
    plugins: []

consumers: []
plugin_configs: []
