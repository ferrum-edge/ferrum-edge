---
# gRPC end-to-end TLS performance test config.
# Client --gRPC+TLS--> gateway --gRPC+TLS--> backend. Every hop encrypted.
# Used exclusively by gateways-protocol-benchmark.yml for the "grpcs" matrix job.
proxies:
  - id: "grpcs-e2e-bench"
    name: "gRPCs E2E Bench Service"
    listen_path: "/bench.BenchService"
    backend_scheme: https
    backend_host: "127.0.0.1"
    backend_port: 50053
    strip_listen_path: false
    preserve_host_header: false
    backend_connect_timeout_ms: 5000
    backend_read_timeout_ms: 30000
    backend_write_timeout_ms: 30000
    backend_tls_server_ca_cert_path: "/etc/ferrum/tls/ca.pem"
    auth_mode: single
    pool_enable_http2: true
    pool_http2_keep_alive_interval_seconds: 30
    pool_http2_keep_alive_timeout_seconds: 45
    # HTTP/2 tuning retained here because grpcs is the one protocol where every
    # gateway negotiates h2 over TLS — these mirror Ferrum's production defaults
    # documented in CLAUDE.md, not benchmark-only tweaks.
    pool_http2_initial_stream_window_size: 8388608
    pool_http2_initial_connection_window_size: 33554432
    pool_http2_adaptive_window: true
    pool_http2_max_frame_size: 1048576
    pool_http2_max_concurrent_streams: 1000
    plugins: []

  - id: "grpcs-e2e-health"
    name: "gRPCs E2E Health"
    listen_path: "/health"
    backend_scheme: http
    backend_host: "127.0.0.1"
    backend_port: 3010
    strip_listen_path: false
    preserve_host_header: false
    backend_connect_timeout_ms: 1000
    backend_read_timeout_ms: 5000
    backend_write_timeout_ms: 5000
    auth_mode: single
    plugins: []

consumers: []
plugin_configs: []
