---
# gRPC performance test config
# Gateway proxies gRPC (h2c) to backend gRPC server
proxies:
  - id: "grpc-bench"
    name: "gRPC Bench Service"
    listen_path: "/bench.BenchService"
    backend_protocol: grpc
    backend_host: "127.0.0.1"
    backend_port: 50052
    strip_listen_path: false
    preserve_host_header: false
    backend_connect_timeout_ms: 5000
    backend_read_timeout_ms: 10000
    backend_write_timeout_ms: 10000
    auth_mode: single
    pool_enable_http2: true
    pool_http2_keep_alive_interval_seconds: 30
    pool_http2_keep_alive_timeout_seconds: 45
    # HTTP/2 flow control tuning — critical for gRPC throughput
    pool_http2_initial_stream_window_size: 8388608       # 8 MiB (vs 64 KB default)
    pool_http2_initial_connection_window_size: 33554432   # 32 MiB
    pool_http2_adaptive_window: false                    # Fixed windows for predictable performance
    pool_http2_max_frame_size: 65535                     # Max allowed frame size
    pool_http2_max_concurrent_streams: 1000              # High concurrency limit
    plugins: []

  - id: "grpc-health"
    name: "Health Check"
    listen_path: "/health"
    backend_protocol: http
    backend_host: "127.0.0.1"
    backend_port: 3010
    strip_listen_path: false
    preserve_host_header: false
    backend_connect_timeout_ms: 1000
    backend_read_timeout_ms: 5000
    backend_write_timeout_ms: 5000
    auth_mode: single
    plugins: []

consumers: []
plugin_configs: []
