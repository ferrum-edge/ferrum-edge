---
# HTTP/1.1+TLS performance test config
# Gateway terminates TLS on HTTPS (8443), proxies to plain HTTP/1.1 backend
proxies:
  - id: "h1-tls-users"
    name: "HTTP/1.1+TLS Users API"
    listen_path: "/api/users"
    backend_protocol: http
    backend_host: "127.0.0.1"
    backend_port: 3001
    strip_listen_path: false
    preserve_host_header: false
    backend_connect_timeout_ms: 5000
    backend_read_timeout_ms: 10000
    backend_write_timeout_ms: 10000
    auth_mode: single
    plugins: []

  - id: "h1-tls-health"
    name: "HTTP/1.1+TLS Health Check"
    listen_path: "/health"
    backend_protocol: http
    backend_host: "127.0.0.1"
    backend_port: 3010
    strip_listen_path: false
    preserve_host_header: false
    backend_connect_timeout_ms: 1000
    backend_read_timeout_ms: 5000
    backend_write_timeout_ms: 5000
    auth_mode: single
    plugins: []

consumers: []
plugin_configs: []
