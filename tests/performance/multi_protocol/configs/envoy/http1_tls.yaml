# Envoy HTTP/1.1 end-to-end TLS reverse proxy config.
# Listener on 8443 with TLS termination → HTTP/1.1+TLS backend on 3447.
# (Port 3443 is H2-only; 3447 is dedicated H1-over-TLS.) All hops encrypted.
# Matches Ferrum's http1_tls_e2e_perf.yaml.
admin:
  address:
    socket_address: { address: 127.0.0.1, port_value: 15000 }

static_resources:
  listeners:
    - name: https_listener
      address:
        socket_address: { address: 127.0.0.1, port_value: 8443 }
      filter_chains:
        - transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              common_tls_context:
                tls_certificates:
                  - certificate_chain: { filename: CERT_PATH }
                    private_key: { filename: KEY_PATH }
                alpn_protocols: ["http/1.1"]
          filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_https
                codec_type: HTTP1
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        # Route every path to the backend. Previously this was
                        # pinned to /api/users which meant the benchmark bench
                        # target (/echo) received a 404 from Envoy and proto_bench
                        # counted non-echo responses as successful — corrupting
                        # HTTP/1.1+TLS comparison numbers for Envoy. A catch-all
                        # prefix matches what Kong/Tyk/KrakenD/Ferrum do.
                        - match: { prefix: "/" }
                          route:
                            cluster: backend_http1
                            timeout: 10s
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                access_log: []

  clusters:
    - name: backend_http1
      connect_timeout: 5s
      type: STATIC
      lb_policy: ROUND_ROBIN
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          common_tls_context:
            alpn_protocols: ["http/1.1"]
            # Trust the benchmark's self-signed CA. CA_PATH is templated
            # at start-up by both harness scripts. Without the
            # validation_context Envoy silently accepts any cert on the
            # upstream leg.
            validation_context:
              trusted_ca:
                filename: CA_PATH
      load_assignment:
        cluster_name: backend_http1
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: 127.0.0.1, port_value: 3447 }
