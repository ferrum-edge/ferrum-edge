# Envoy HTTP/2 (TLS + ALPN) reverse proxy config
# Listener on 8443 with HTTP/2 termination → HTTPS/H2 backend on 3443
admin:
  address:
    socket_address: { address: 127.0.0.1, port_value: 15000 }

static_resources:
  listeners:
    - name: https_h2_listener
      address:
        socket_address: { address: 127.0.0.1, port_value: 8443 }
      filter_chains:
        - transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              common_tls_context:
                tls_certificates:
                  - certificate_chain: { filename: CERT_PATH }
                    private_key: { filename: KEY_PATH }
                # Force ALPN h2 only. With `["h2", "http/1.1"]` Envoy will
                # silently negotiate http/1.1 for bench clients that offer
                # both, then hyper's HTTP/2 client-side handshake fails on
                # the first send_request — producing 0 RPS / 100 errors.
                # Matching grpcs.yaml's h2-only ALPN forces every client to
                # either get h2 or fail the TLS handshake cleanly.
                alpn_protocols: ["h2"]
          filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_https_h2
                codec_type: HTTP2
                # HTTP/2 flow-control uses Envoy defaults (256KB stream / 1MB
                # connection window) so the benchmark compares each gateway
                # as-shipped. Kong/Tyk/KrakenD can't easily match Ferrum's
                # 8MB/32MB defaults, so explicit tuning here would bias results.
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: backend_h2_tls
                            timeout: 30s
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                access_log: []

  clusters:
    - name: backend_h2_tls
      connect_timeout: 5s
      type: STATIC
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            # Upstream HTTP/2 with Envoy defaults — see note on downstream above.
            http2_protocol_options: {}
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          common_tls_context:
            alpn_protocols: ["h2"]
            validation_context:
              trusted_ca:
                filename: CA_PATH
      load_assignment:
        cluster_name: backend_h2_tls
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: 127.0.0.1, port_value: 3443 }
