# Envoy TCP proxy config (equivalent to ferrum tcp_perf.yaml)
# Listener on 5010, raw TCP → backend echo on 3004
admin:
  address:
    socket_address: { address: 127.0.0.1, port_value: 15000 }

static_resources:
  listeners:
    - name: tcp_listener
      address:
        socket_address: { address: 127.0.0.1, port_value: 5010 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: tcp_stats
                cluster: backend_tcp
                idle_timeout: 300s
                access_log: []

  clusters:
    - name: backend_tcp
      connect_timeout: 5s
      type: STATIC
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: backend_tcp
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: 127.0.0.1, port_value: 3004 }
