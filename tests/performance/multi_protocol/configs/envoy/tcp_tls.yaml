# Envoy TCP end-to-end TLS proxy config.
# Listener on 5001 with TLS termination → TCP+TLS backend on 3444 (origination).
# Every hop encrypted; matches Ferrum's tcp_tls_e2e_perf.yaml.
admin:
  address:
    socket_address: { address: 127.0.0.1, port_value: 15000 }

static_resources:
  listeners:
    - name: tcp_tls_listener
      address:
        socket_address: { address: 127.0.0.1, port_value: 5001 }
      filter_chains:
        - transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              common_tls_context:
                tls_certificates:
                  - certificate_chain: { filename: CERT_PATH }
                    private_key: { filename: KEY_PATH }
          filters:
            - name: envoy.filters.network.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: tcp_tls_stats
                cluster: backend_tcp
                idle_timeout: 300s
                access_log: []

  clusters:
    - name: backend_tcp
      connect_timeout: 5s
      type: STATIC
      lb_policy: ROUND_ROBIN
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          common_tls_context: {}
      load_assignment:
        cluster_name: backend_tcp
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: 127.0.0.1, port_value: 3444 }
