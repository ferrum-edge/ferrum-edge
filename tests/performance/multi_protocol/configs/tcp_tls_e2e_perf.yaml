---
# TCP end-to-end TLS performance test config.
# Client --TCP+TLS--> gateway --TCP+TLS--> backend. Every hop encrypted.
# Used exclusively by gateways-protocol-benchmark.yml for the "tcp-tls" matrix job.
proxies:
  - id: "tcp-tls-e2e-echo"
    name: "TCP+TLS E2E Echo"
    # `listen_path` MUST be omitted on stream proxies — setting it to an
    # empty string deserializes to Some("") which is a hard validation
    # error ("stream proxy must not set listen_path"), causing the Ferrum
    # container to exit on startup with nothing visible to the bench
    # harness. Omit the field entirely.
    listen_port: 5001
    backend_protocol: tcp_tls
    backend_host: "127.0.0.1"
    backend_port: 3444
    frontend_tls: true
    backend_tls_server_ca_cert_path: "/etc/ferrum/tls/ca.pem"
    backend_connect_timeout_ms: 5000
    backend_read_timeout_ms: 30000
    backend_write_timeout_ms: 30000
    auth_mode: single
    plugins: []

  - id: "tcp-tls-e2e-health"
    name: "Health"
    listen_path: "/health"
    backend_protocol: http
    backend_host: "127.0.0.1"
    backend_port: 3010
    strip_listen_path: false
    preserve_host_header: false
    backend_connect_timeout_ms: 1000
    backend_read_timeout_ms: 5000
    backend_write_timeout_ms: 5000
    auth_mode: single
    plugins: []

consumers: []
plugin_configs: []
