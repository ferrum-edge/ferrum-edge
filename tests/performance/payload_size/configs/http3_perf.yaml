---
# HTTP/3 (QUIC) payload size test config
# Gateway listens with HTTP/3 enabled, proxies to HTTP/3 backend
proxies:
  - id: "h3-echo"
    name: "HTTP/3 Echo"
    listen_path: "/echo"
    backend_protocol: h3
    backend_host: "127.0.0.1"
    backend_port: 4445
    strip_listen_path: false
    preserve_host_header: false
    backend_connect_timeout_ms: 5000
    backend_read_timeout_ms: 30000
    backend_write_timeout_ms: 30000
    backend_tls_verify_server_cert: false
    auth_mode: single
    plugins: []

  - id: "h3-health"
    name: "Health Check"
    listen_path: "/health"
    backend_protocol: http
    backend_host: "127.0.0.1"
    backend_port: 4010
    strip_listen_path: false
    preserve_host_header: false
    backend_connect_timeout_ms: 1000
    backend_read_timeout_ms: 5000
    backend_write_timeout_ms: 5000
    auth_mode: single
    plugins: []

consumers: []
plugin_configs: []
