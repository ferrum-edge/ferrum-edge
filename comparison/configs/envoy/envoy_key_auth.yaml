static_resources:
  listeners:
    - name: proxy_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8000
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: AUTO
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/api/users-auth"
                          route:
                            cluster: backend_cluster
                            timeout: 5s
                            regex_rewrite:
                              pattern:
                                regex: "^/api/users-auth(.*)"
                              substitution: "/api/users\\1"
                        - match:
                            prefix: "/"
                          route:
                            cluster: backend_cluster
                            timeout: 5s
                http_filters:
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      default_source_code:
                        inline_string: |
                          function envoy_on_request(request_handle)
                            local path = request_handle:headers():get(":path")
                            if path and path:sub(1, 15) == "/api/users-auth" then
                              local key = request_handle:headers():get("apikey")
                              if key ~= "test-api-key" then
                                request_handle:respond(
                                  {[":status"] = "401", ["content-type"] = "application/json"},
                                  '{"error":"Invalid API key"}'
                                )
                              end
                            end
                          end
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                access_log: []
  clusters:
    - name: backend_cluster
      connect_timeout: 1s
      type: STRICT_DNS
      dns_lookup_family: V4_ONLY
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: backend_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: BACKEND_HOST
                      port_value: 3001
admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901
