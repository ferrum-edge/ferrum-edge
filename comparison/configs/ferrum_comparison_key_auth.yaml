---
# Ferrum Edge comparison benchmark configuration — key-auth enabled
# Includes a health check proxy plus one authenticated echo proxy

proxies:
  - id: "proxy-health"
    name: "Health Check Proxy"
    listen_path: "/health"
    backend_protocol: http
    backend_host: "BACKEND_HOST"
    backend_port: 3001
    strip_listen_path: false
    preserve_host_header: false
    backend_connect_timeout_ms: 1000
    backend_read_timeout_ms: 5000
    backend_write_timeout_ms: 5000
    backend_tls_verify_server_cert: true
    auth_mode: single
    plugins: []

  - id: "proxy-echo-auth"
    name: "Echo API Proxy (Key Auth)"
    listen_path: "/api/echo-auth"
    backend_protocol: http
    backend_host: "BACKEND_HOST"
    backend_port: 3001
    strip_listen_path: true
    preserve_host_header: false
    backend_connect_timeout_ms: 1000
    backend_read_timeout_ms: 5000
    backend_write_timeout_ms: 5000
    backend_tls_verify_server_cert: true
    backend_path: "/api/echo"
    auth_mode: single
    pool_idle_timeout_seconds: 180
    plugins:
      - plugin_config_id: "plugin-keyauth-bench"

consumers:
  - id: "consumer-bench"
    username: "benchuser"
    custom_id: "benchmark"
    credentials:
      keyauth:
        key: "test-api-key"

plugin_configs:
  - id: "plugin-keyauth-bench"
    plugin_name: "key_auth"
    config:
      key_location: "header:apikey"
    scope: proxy
    proxy_id: "proxy-echo-auth"
    enabled: true
