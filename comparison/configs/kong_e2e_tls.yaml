_format_version: "3.0"

# Kong DB-less declarative configuration — end-to-end TLS
# Frontend: HTTPS (TLS termination) → Backend: HTTPS (re-encryption)
#
# NOTE: BACKEND_HOST is replaced at runtime by run_comparison.sh
# NOTE: Backend TLS verification is disabled via KONG_TLS_CERTIFICATE_VERIFY=off
# in run_comparison.sh because the benchmark measures TLS encryption overhead,
# not certificate verification. The self-signed test cert causes hostname
# verification failures in Kong/OpenSSL. Kong 3.14+ forbids service-level
# tls_verify overrides when the global setting is enabled.

services:
  - name: health-service-e2e
    host: BACKEND_HOST
    port: 3443
    protocol: https
    connect_timeout: 1000
    read_timeout: 5000
    write_timeout: 5000
    routes:
      - name: health-route-e2e
        paths:
          - /health
        protocols:
          - http
          - https
        strip_path: false
        preserve_host: false

  - name: echo-service-e2e
    host: BACKEND_HOST
    port: 3443
    protocol: https
    connect_timeout: 1000
    read_timeout: 5000
    write_timeout: 5000
    routes:
      - name: echo-route-e2e
        paths:
          - /api/echo
        protocols:
          - http
          - https
        methods:
          - POST
        strip_path: false
        preserve_host: false
