_format_version: "3.0"

# Kong DB-less declarative configuration — end-to-end TLS
# Frontend: HTTPS (TLS termination) → Backend: HTTPS (re-encryption)
#
# NOTE: BACKEND_HOST is replaced at runtime by run_comparison.sh
# NOTE: tls_verify is false because the benchmark measures TLS encryption
# overhead, not certificate verification. The self-signed test cert causes
# hostname verification failures in Kong/OpenSSL.

services:
  - name: health-service-e2e
    host: BACKEND_HOST
    port: 3443
    protocol: https
    tls_verify: false
    connect_timeout: 1000
    read_timeout: 5000
    write_timeout: 5000
    routes:
      - name: health-route-e2e
        paths:
          - /health
        protocols:
          - http
          - https
        strip_path: false
        preserve_host: false

  - name: echo-service-e2e
    host: BACKEND_HOST
    port: 3443
    protocol: https
    tls_verify: false
    connect_timeout: 1000
    read_timeout: 5000
    write_timeout: 5000
    routes:
      - name: echo-route-e2e
        paths:
          - /api/echo
        protocols:
          - http
          - https
        methods:
          - POST
        strip_path: false
        preserve_host: false
