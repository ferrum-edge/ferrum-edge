_format_version: "3.0"

# Kong DB-less declarative configuration for key-auth comparison benchmarks
#
# NOTE: BACKEND_HOST is replaced at runtime by run_comparison.sh

services:
  - name: health-service
    host: BACKEND_HOST
    port: 3001
    protocol: http
    connect_timeout: 1000
    read_timeout: 5000
    write_timeout: 5000
    routes:
      - name: health-route
        paths:
          - /health
        strip_path: false
        preserve_host: false

  - name: echo-auth-service
    host: BACKEND_HOST
    port: 3001
    protocol: http
    path: /api/echo
    connect_timeout: 1000
    read_timeout: 5000
    write_timeout: 5000
    routes:
      - name: echo-auth-route
        paths:
          - /api/echo-auth
        methods:
          - POST
        strip_path: true
        preserve_host: false
        plugins:
          - name: key-auth
            config:
              key_names:
                - apikey
              hide_credentials: true

consumers:
  - username: benchuser
    keyauth_credentials:
      - key: test-api-key
