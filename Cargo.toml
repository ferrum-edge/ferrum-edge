[package]
name = "ferrum-gateway"
version = "0.1.0"
edition = "2024"
description = "A high-performance API Gateway and Reverse Proxy built in Rust"
license = "MIT"

[[bin]]
name = "ferrum-gateway"
path = "src/main.rs"


[dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }
tokio-stream = { version = "0.1", features = ["full"] }

# HTTP
hyper = { version = "1", features = ["full"] }
hyper-util = { version = "0.1", features = ["full"] }
http-body-util = "0.1"
http = "1"

# TLS
rustls = { version = "0.23", features = ["ring", "std"] }
tokio-rustls = "0.26"
rustls-pemfile = "2"
webpki-roots = "0.26"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"

# Database
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "mysql", "sqlite", "chrono", "json"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# gRPC
tonic = { version = "0.12", features = ["tls"] }
prost = "0.13"

# JWT and auth
jsonwebtoken = "9"
bcrypt = "0.19"
argon2 = "0.5"

# WebSocket
tokio-tungstenite = { version = "0.24", features = ["rustls-tls-webpki-roots"] }
futures-util = "0.3"

# HTTP/3 / QUIC
quinn = "0.11.9"
h3 = "0.0.8"
h3-quinn = "0.0.10"

# Time/date
chrono = { version = "0.4", features = ["serde"] }

# Other utilities
uuid = { version = "1", features = ["v4", "serde"] }
dashmap = "6"
arc-swap = "1"
bytes = "1"
thiserror = "2"
anyhow = "1"
async-trait = "0.1"
pin-project-lite = "0.2"
reqwest = { version = "0.12", features = ["json", "rustls-tls"] }
hickory-resolver = { version = "0.25", features = ["tokio", "system-config"] }
base64 = "0.22"
url = "2"
socket2 = { version = "0.6.3", features = ["all"] }

[build-dependencies]
tonic-build = "0.12"

[dev-dependencies]
tempfile = "3"
wiremock = "0.6"
# Functional testing dependencies
rand = "0.8"
futures = "0.3"
# Simple HTTP server dependencies
tokio = { version = "1", features = ["net", "io-util", "time", "rt"] }
