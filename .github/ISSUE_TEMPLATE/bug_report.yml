---
name: Bug Report
description: Create a report to help us improve Ferrum Edge
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: Describe the bug...
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Set FERRUM_MODE=...
        2. Configure proxy with ...
        3. Send request to ...
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: Describe what should have happened...
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: Describe what actually happened...
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Relevant configuration (redact sensitive information)
      placeholder: |
        Environment variables:
        - FERRUM_MODE=database
        - FERRUM_DB_TYPE=postgres
        
        Proxy config:
        ```yaml
        proxies:
          - id: my-proxy
            listen_path: /api
            ...
        ```
      render: yaml
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output (redact sensitive information)
      placeholder: Paste logs here...
      render: text
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of Ferrum Edge are you running?
      placeholder: e.g., 1.2.3 or commit hash
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What OS are you running on?
      options:
        - Linux
        - macOS
        - Windows
        - Other
  - type: dropdown
    id: mode
    attributes:
      label: Operating Mode
      description: Which FERRUM_MODE are you using?
      options:
        - database
        - file
        - cp (Control Plane)
        - dp (Data Plane)
        - Other
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have provided all relevant configuration and logs
          required: true
        - label: I am running the latest version or have checked the changelog
          required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem
      placeholder: Add any other context here...
