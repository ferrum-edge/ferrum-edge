name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        continue-on-error: true

      - name: Configure sccache
        run: |
          if command -v sccache &> /dev/null && sccache --start-server 2>/dev/null; then
            echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
            echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
            echo "sccache enabled"
          else
            echo "sccache unavailable, building without cache"
          fi

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-test"

      - name: Install protoc and libcurl headers
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libcurl4-openssl-dev

      - name: Run unit tests
        run: cargo test --test unit_tests
        env:
          RUST_BACKTRACE: 1

      - name: Run integration tests
        run: cargo test --test integration_tests
        env:
          RUST_BACKTRACE: 1

      - name: Build gateway binary for end-to-end tests
        run: cargo build --bin ferrum-edge

      - name: Run end-to-end tests (gRPC, WebSocket, file mode, database, CP/DP)
        run: cargo test --test functional_tests -- --ignored --skip test_scale_perf_30k_proxies --skip test_load_stress
        env:
          RUST_BACKTRACE: 1
        timeout-minutes: 15

      - name: Summarize test results
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All unit, integration, functional, and end-to-end tests executed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Includes \`--ignored\` tests: gRPC proxying, WebSocket proxying, TCP/UDP/DTLS stream proxying, file mode reload, database mode, and CP/DP sync." >> $GITHUB_STEP_SUMMARY

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [fmt]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        continue-on-error: true

      - name: Configure sccache
        run: |
          if command -v sccache &> /dev/null && sccache --start-server 2>/dev/null; then
            echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
            echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
            echo "sccache enabled"
          else
            echo "sccache unavailable, building without cache"
          fi

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-lint"

      - name: Install protoc and libcurl headers
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libcurl4-openssl-dev

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  performance-regression:
    name: Performance Regression Check
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        continue-on-error: true

      - name: Configure sccache
        run: |
          if command -v sccache &> /dev/null && sccache --start-server 2>/dev/null; then
            echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
            echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
            echo "sccache enabled"
          else
            echo "sccache unavailable, building without cache"
          fi

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-perf"

      - name: Install protoc and libcurl headers
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libcurl4-openssl-dev

      - name: Build release binaries
        run: |
          cargo build --profile ci-release --bin ferrum-edge
          cd tests/performance && cargo build --release --bin backend_server

      - name: Start backend server
        run: |
          tests/performance/target/release/backend_server > /tmp/backend.log 2>&1 &
          echo "BACKEND_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:3001/health > /dev/null 2>&1; then
              echo "Backend ready"
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "Backend failed to start"
              cat /tmp/backend.log
              exit 1
            fi
            sleep 1
          done

      - name: Start gateway
        run: |
          FERRUM_MODE=file \
          FERRUM_FILE_CONFIG_PATH="$(pwd)/tests/performance/perf_config.yaml" \
          FERRUM_LOG_LEVEL=error \
          FERRUM_ADD_VIA_HEADER=false \
          FERRUM_POOL_MAX_IDLE_PER_HOST=200 \
          FERRUM_POOL_IDLE_TIMEOUT_SECONDS=120 \
          FERRUM_POOL_ENABLE_HTTP_KEEP_ALIVE=true \
          FERRUM_POOL_ENABLE_HTTP2=false \
          FERRUM_POOL_WARMUP_ENABLED=true \
          ./target/ci-release/ferrum-edge > /tmp/gateway.log 2>&1 &
          echo "GATEWAY_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null 2>&1; then
              echo "Gateway ready"
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "Gateway failed to start"
              cat /tmp/gateway.log
              exit 1
            fi
            sleep 1
          done

      - name: Run self-relative performance test
        timeout-minutes: 5
        run: |
          mkdir -p tests/performance/ci_results
          python3 tests/performance/ci_overhead_bench.py \
            --gateway-url http://127.0.0.1:8000/api/users \
            --backend-url http://127.0.0.1:3001/api/users \
            --gateway-health-url http://127.0.0.1:8000/health \
            --concurrency 50 \
            --duration 5 \
            --iterations 3 \
            --warmup 2 \
            --overhead-threshold 50 \
            --output tests/performance/ci_results/overhead_results.json

      - name: Stop services
        if: always()
        run: |
          kill $BACKEND_PID 2>/dev/null || true
          kill $GATEWAY_PID 2>/dev/null || true

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: performance-results
          path: tests/performance/ci_results/
          retention-days: 30

      - name: Post performance summary
        if: always()
        run: |
          echo "## Performance Regression Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f tests/performance/ci_results/overhead_results.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat tests/performance/ci_results/overhead_results.json >> $GITHUB_STEP_SUMMARY
            echo '' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "Performance tests did not produce results." >> $GITHUB_STEP_SUMMARY
          fi

  # ── Cross-platform builds (PRs + main) & Release (main only) ──────────

  build-binaries:
    name: Build (${{ matrix.asset_name }})
    needs: [test, lint]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ferrum-edge
            asset_name: ferrum-edge-linux-x86_64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: ferrum-edge
            asset_name: ferrum-edge-linux-aarch64

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: ferrum-edge
            asset_name: ferrum-edge-macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: ferrum-edge
            asset_name: ferrum-edge-macos-aarch64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ferrum-edge.exe
            asset_name: ferrum-edge-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        continue-on-error: true

      - name: Configure sccache
        shell: bash
        run: |
          if command -v sccache &> /dev/null && sccache --start-server 2>/dev/null; then
            echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
            echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          fi

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "build-${{ matrix.target }}"

      - name: Install protoc and build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libcurl4-openssl-dev

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc and NASM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install protoc nasm -y
          echo "C:\Program Files\NASM" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8

      - name: Install cross (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross

      - name: Build release binary (cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }}
        env:
          RUSTC_WRAPPER: ""

      - name: Build release binary (cargo)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-assets
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "release-assets/${{ matrix.asset_name }}"
          cd release-assets
          if command -v sha256sum &> /dev/null; then
            sha256sum "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"
          fi
          cat "${{ matrix.asset_name }}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.target }}
          path: release-assets/

  latest-release:
    name: Update Latest Release
    needs: build-binaries
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: downloaded-artifacts
          pattern: binary-*

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find downloaded-artifacts -type f -exec cp {} release-assets/ \;
          echo "Release assets:"
          ls -la release-assets/

      - name: Create or update latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing latest release and tag
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

          # Build release notes
          cat > notes.md << 'NOTES'
          ## Latest Development Build

          Auto-built from the latest commit on `main` (${{ github.sha }}).

          For stable releases, download a versioned tag (e.g., `v1.0.0`).

          ### Binaries

          | Platform | Binary |
          |----------|--------|
          | Linux x86_64 | `ferrum-edge-linux-x86_64` |
          | Linux ARM64 | `ferrum-edge-linux-aarch64` |
          | macOS x86_64 | `ferrum-edge-macos-x86_64` |
          | macOS ARM64 (Apple Silicon) | `ferrum-edge-macos-aarch64` |
          | Windows x86_64 | `ferrum-edge-windows-x86_64.exe` |

          ### Docker

          ```bash
          docker pull ferrumedge/ferrum-edge:latest
          docker pull ghcr.io/ferrum-edge/ferrum-edge:latest
          ```

          ### Checksums

          ```
          NOTES
          cat release-assets/*.sha256 >> notes.md
          echo '```' >> notes.md

          # Create the release
          gh release create latest \
            --title "Latest Build ($(date -u +%Y-%m-%d))" \
            --notes-file notes.md \
            --prerelease \
            --target "${{ github.sha }}" \
            release-assets/*

  docker:
    name: Docker (${{ matrix.platform }})
    needs: build-binaries
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            binary_target: x86_64-unknown-linux-gnu
            binary_asset: ferrum-edge-linux-x86_64
            arch_dir: amd64
          - platform: linux/arm64
            binary_target: aarch64-unknown-linux-gnu
            binary_asset: ferrum-edge-linux-aarch64
            arch_dir: arm64
    steps:
      - uses: actions/checkout@v6

      - name: Download Linux binary
        uses: actions/download-artifact@v8
        with:
          name: binary-${{ matrix.binary_target }}
          path: downloaded-artifacts

      - name: Prepare Docker context
        run: |
          mkdir -p docker-context/bin/${{ matrix.arch_dir }}
          cp downloaded-artifacts/${{ matrix.binary_asset }} docker-context/bin/${{ matrix.arch_dir }}/ferrum-edge
          cp Dockerfile.release docker-context/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push per-platform digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: docker-context
          platforms: ${{ matrix.platform }}
          outputs: type=image,"name=ferrumedge/ferrum-edge,ghcr.io/${{ github.repository }}",push-by-digest=true,name-canonical=true,push=true
          provenance: false

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: docker-digest-${{ matrix.arch_dir }}
          path: /tmp/digests/*
          if-no-files-found: error

  docker-manifest:
    name: Docker Manifest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: docker-digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifest (Docker Hub)
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ferrumedge/ferrum-edge:latest \
            -t ferrumedge/ferrum-edge:main-${{ github.sha }} \
            $(printf 'ferrumedge/ferrum-edge@sha256:%s ' *)

      - name: Create and push multi-arch manifest (GHCR)
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:latest \
            -t ghcr.io/${{ github.repository }}:main-${{ github.sha }} \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)

