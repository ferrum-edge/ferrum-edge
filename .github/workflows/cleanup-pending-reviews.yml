name: Cleanup Pending Deployment Reviews

on:
  schedule:
    - cron: '0 */4 * * *'  # Run every 4 hours
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (no actual rejection)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      max_age_minutes:
        description: 'Reject pending reviews older than this many minutes'
        required: false
        default: '20'
        type: string

# Note: REVIEW_TOKEN secret (a PAT from a named environment reviewer) is
# required because GITHUB_TOKEN cannot approve/reject deployment reviews.
# The PAT needs repo scope (classic) or actions:write (fine-grained).

jobs:
  cleanup-pending-reviews:
    name: Auto-reject stale pending reviews
    runs-on: ubuntu-latest
    steps:
      - name: Reject stale pending deployment reviews
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          MAX_AGE_MINUTES="${{ github.event.inputs.max_age_minutes || '20' }}"

          echo "Dry run mode: $DRY_RUN"
          echo "Max age threshold: $MAX_AGE_MINUTES minutes"

          CUTOFF_EPOCH=$(date -d "$MAX_AGE_MINUTES minutes ago" +%s 2>/dev/null || date -v-${MAX_AGE_MINUTES}M +%s)
          REJECTED_COUNT=0
          SKIPPED_COUNT=0

          # List workflow runs that are waiting for deployment review (paginated)
          # Fetch id and run_started_at together to avoid per-run API calls
          WAITING_RUNS=$(gh api --paginate "repos/${{ github.repository }}/actions/runs?status=waiting&per_page=100" \
            --jq '.workflow_runs[] | "\(.id) \(.run_started_at // .created_at)"')

          if [[ -z "$WAITING_RUNS" ]]; then
            echo "No workflow runs waiting for deployment review."
            exit 0
          fi

          while IFS=' ' read -r RUN_ID RUN_STARTED; do
            echo ""
            echo "--- Checking run $RUN_ID (started $RUN_STARTED) ---"

            if [[ -z "$RUN_STARTED" || "$RUN_STARTED" == "null" ]]; then
              echo "  No timestamp available, skipping"
              SKIPPED_COUNT=$((SKIPPED_COUNT + 1))
              continue
            fi

            STARTED_EPOCH=$(date -d "$RUN_STARTED" +%s 2>/dev/null || date -jf "%Y-%m-%dT%H:%M:%SZ" "$RUN_STARTED" +%s 2>/dev/null || echo "0")

            if [[ "$STARTED_EPOCH" -eq 0 ]]; then
              echo "  Could not parse timestamp '$RUN_STARTED', skipping"
              SKIPPED_COUNT=$((SKIPPED_COUNT + 1))
              continue
            fi

            AGE_SECONDS=$(($(date +%s) - STARTED_EPOCH))
            AGE_MINUTES=$((AGE_SECONDS / 60))

            if [[ "$STARTED_EPOCH" -gt "$CUTOFF_EPOCH" ]]; then
              echo "  Run is ${AGE_MINUTES}m old (< ${MAX_AGE_MINUTES}m threshold), skipping"
              SKIPPED_COUNT=$((SKIPPED_COUNT + 1))
              continue
            fi

            echo "  Run is ${AGE_MINUTES}m old (>= ${MAX_AGE_MINUTES}m threshold)"

            # Get pending deployment environment IDs for this run
            PENDING_JSON=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID/pending_deployments" 2>/dev/null || echo "[]")
            ENV_IDS=$(echo "$PENDING_JSON" | jq '[.[].environment.id]')
            ENV_COUNT=$(echo "$ENV_IDS" | jq 'length')

            if [[ "$ENV_COUNT" -eq 0 ]]; then
              echo "  No pending deployments, skipping"
              SKIPPED_COUNT=$((SKIPPED_COUNT + 1))
              continue
            fi

            ENV_NAMES=$(echo "$PENDING_JSON" | jq -r '[.[].environment.name] | join(", ")')
            echo "  Found $ENV_COUNT pending environment(s): $ENV_NAMES"

            if [[ "$DRY_RUN" == "true" ]]; then
              echo "  [DRY RUN] Would reject $ENV_COUNT environment(s) for run $RUN_ID"
            else
              echo "  Rejecting $ENV_COUNT environment(s) for run $RUN_ID..."
              PAYLOAD=$(jq -n --argjson ids "$ENV_IDS" '{
                environment_ids: $ids,
                state: "rejected",
                comment: "Auto-rejected: pending > '"$MAX_AGE_MINUTES"' minutes (cleanup-pending-reviews workflow)"
              }')

              RESPONSE=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID/pending_deployments" \
                --method POST \
                --input - <<< "$PAYLOAD" 2>&1) && {
                echo "  Rejected run $RUN_ID"
              } || {
                echo "  Warning: rejection failed for run $RUN_ID: $RESPONSE"
              }
            fi
            REJECTED_COUNT=$((REJECTED_COUNT + 1))
          done <<< "$WAITING_RUNS"

          echo ""
          echo "Summary: $REJECTED_COUNT run(s) rejected, $SKIPPED_COUNT skipped"
        env:
          GH_TOKEN: ${{ secrets.REVIEW_TOKEN }}
